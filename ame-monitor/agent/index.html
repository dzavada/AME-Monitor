<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Adobe Media Encoder Monitor</title>
<style>
  html, body { margin: 0; background: #1e2128; color: #e6e8ec;
    font: 12px/1.5 -apple-system, "SF Pro Text", system-ui, sans-serif; }
  .wrap { padding: 14px 16px; }
  .host { font-size: 15px; font-weight: 600; letter-spacing: .2px; }
  .ready { color: #8b93a3; margin-bottom: 12px; }
  .row { display: flex; justify-content: space-between; gap: 10px;
    padding: 6px 0; border-top: 1px solid #2c303a; }
  .row span:first-child { color: #8b93a3; }
  .row span:last-child { font-family: ui-monospace, "SF Mono", Menlo, monospace; text-align: right; }
  .serve { margin-top: 14px; padding: 8px 10px; border-radius: 6px; background: #161920;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
    color: #8b93a3; word-break: break-all; }
  .serve.ok { color: #5fb87a; }
  .serve.err { color: #e0625e; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="host" id="host">—</div>
    <div class="ready" id="ready">starting…</div>
    <div class="row"><span>batch</span><span id="state">—</span></div>
    <div class="row"><span>current job</span><span id="job">—</span></div>
    <div class="row"><span>tallies</span><span id="counts">—</span></div>
    <div class="row"><span>watch</span><span id="watchline">—</span></div>
    <div class="row"><span>preview</span><span id="thumbline">—</span></div>
    <div class="serve" id="serve">starting…</div>
  </div>
  <script src="./js/CSInterface.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
